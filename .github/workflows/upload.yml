name: Upload Finder‑APK to Punkpaste

on:
  workflow_dispatch: # دستی اجرا کن

jobs:
  upload_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Download Finder‑APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Finder-APK
          run-id: 25566188102       # ID اجرای build قبلی
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded files
        run: |
          ls -lh
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          echo "📦 فایل انتخاب‌شده: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Init upload session
        id: init
        run: |
          echo "در حال ایجاد جلسه آپلود در punkpaste.ir ..."
          RESP=$(curl -s -m 20 -X POST https://punkpaste.ir/upload/init \
            --insecure \
            -H "Content-Type: application/json" \
            -d '{}' )
          echo "📥 پاسخ سرور: $RESP"
          UUID=$(echo $RESP | jq -r '.uuid')
          if [ -z "$UUID" ] || [ "$UUID" == "null" ]; then
            echo "❌ شناسه فایل پیدا نشد"
            exit 1
          fi
          echo "✅ شناسه فایل: $UUID"
          echo "UUID=$UUID" >> $GITHUB_ENV

      - name: Upload the APK chunk
        run: |
          curl -X POST "https://punkpaste.ir/upload/chunk/${{ env.UUID }}?index=0" \
            --insecure \
            -F "chunk=@${{ env.APK_PATH }}" \
            -o chunk_result.json
          cat chunk_result.json

      - name: Complete upload
        run: |
          curl -X POST "https://punkpaste.ir/upload/complete/${{ env.UUID }}" \
            --insecure \
            -H "Content-Type: application/json" \
            -o upload_done.json
          cat upload_done.json

      - name: Print final link
        run: |
          LINK=$(grep -o 'https://punkpaste.ir/f/[a-zA-Z0-9_-]*' upload_done.json || true)
          echo "🔗 لینک نهایی فایل شما: $LINK"
