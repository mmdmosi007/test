name: Release_Finder_APK

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of Build_Finder_APK"
        required: true

permissions:
  actions: read
  contents: write

jobs:
  release_apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Download APK artifact from build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.inputs.run_id }}
          name: Finder-APK
          path: release-files

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-build
          name: Auto Build APK
          body: |
            Build generated automatically by GitHub Actions
            Released from existing artifact
          files: |
            release-files/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
