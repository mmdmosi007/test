name: Release_Finder_APK

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of Build_Finder_APK"
        required: true
      tag_name:
        description: "Git tag for the release"
        required: true
        default: "auto-build"
      release_name:
        description: "Release title"
        required: true
        default: "Auto Build APK"

permissions:
  actions: read
  contents: write

jobs:
  release_apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Download APK artifact from build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.inputs.run_id }}
          name: built-apk
          path: release-files
          if_no_artifact_found: fail

      - name: Show downloaded files
        run: |
          echo "Downloaded files:"
          ls -R release-files

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_name }}
          body: |
            Build generated automatically by GitHub Actions
            Released from existing artifact
          files: |
            release-files/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
