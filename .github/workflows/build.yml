name: Build_Finder_APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK + NDK
        run: |
          sudo mkdir -p /opt/android-sdk
          cd /opt/android-sdk
          sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          sudo unzip tools.zip
          sudo mkdir -p /opt/android-sdk/cmdline-tools/latest
          sudo mv cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/ || true

          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"

          sudo mkdir -p /opt/android-sdk/tools/bin
          sudo ln -s /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager /opt/android-sdk/tools/bin/sdkmanager

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip build-essential \
            libffi-dev libssl-dev libncurses6 libncurses-dev \
            zlib1g-dev libsqlite3-dev libbz2-dev libreadline-dev liblzma-dev

      - name: Create virtual environment and install Buildozer
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36 buildozer kivy==2.2.1 pyjnius
          pip install "git+https://github.com/kivy/python-for-android.git"

      - name: Build APK
        run: |
          . venv/bin/activate
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          export ANDROIDAPI=33
          export NDKAPI=21
          export ANDROIDSDK=/opt/android-sdk
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export ANDROIDNDK=/opt/android-sdk/ndk/25.1.8937393
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: bin/*.apk

  release_apk:
    needs: build_apk
    runs-on: ubuntu-22.04

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: built-apk
          path: release-files

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-build
          name: Auto Build APK
          body: |
            Build generated automatically by GitHub Actions
            Triggered manually
          files: |
            release-files/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
