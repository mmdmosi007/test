name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK command-line tools
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          cd /opt/android-sdk

          sudo wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          sudo unzip -q -o cmdline-tools.zip

          sudo mkdir -p /opt/android-sdk/cmdline-tools/latest
          sudo mv cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/ || true

          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          echo "PATH=/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Install Android SDK packages and NDK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:$PATH

          yes | sdkmanager --licenses
          sdkmanager --sdk_root=/opt/android-sdk \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.1.8937393"

          ls -la /opt/android-sdk/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/bin/clang

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo6 cmake libffi-dev libssl-dev \
            build-essential ccache \
            libltdl-dev libbz2-dev libsqlite3-dev \
            libreadline-dev liblzma-dev

      - name: Create virtual environment and install Buildozer
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install buildozer python-for-android

      - name: Clean previous build cache
        run: |
          rm -rf .buildozer
          rm -rf /home/runner/.buildozer

      - name: Build APK
        run: |
          source venv/bin/activate

          export ANDROIDSDK=/opt/android-sdk
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export ANDROIDNDK=/opt/android-sdk/ndk/25.1.8937393
          export ANDROID_NDK_HOME=/opt/android-sdk/ndk/25.1.8937393
          export ANDROID_NDK_ROOT=/opt/android-sdk/ndk/25.1.8937393

          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: bin/*.apk
