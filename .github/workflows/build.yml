name: Build_Finder_APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      # Python 3.10 پایدار برای buildozer
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Java 17 (سازگار با جدیدترین SDK)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # وابستگی‌های لازم
      - name: Install System Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip build-essential \
            libffi-dev libssl-dev \
            libncurses6 libncurses-dev \
            zlib1g-dev libsqlite3-dev \
            libbz2-dev libreadline-dev liblzma-dev

      # نصب SDK و commandline-tools درست
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip sdk.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true

          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # قبول خودکار لایسنس‌ها
      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      # نصب platform و build-tools که buildozer می‌خواهد
      - name: Install Required Android Packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"

      # نصب buildozer در venv
      - name: Setup Buildozer
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install cython buildozer

      # ساخت APK
      - name: Build APK
        run: |
          source venv/bin/activate
          buildozer android debug

      # آپلود خروجی
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finder-APK
          path: bin/*.apk
