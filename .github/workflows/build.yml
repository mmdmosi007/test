name: Build_Finder_APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ✅ Python پایدار
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ Java 11 رسمی اندروید
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # ✅ وابستگی‌های سیستمی
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip git \
            build-essential \
            libffi-dev libssl-dev \
            libncurses6 libncurses-dev \
            zlib1g-dev libsqlite3-dev \
            libbz2-dev libreadline-dev \
            liblzma-dev

      # ✅ نصب Android SDK دستی
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip sdk.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true

          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

      # ✅ قبول خودکار License
      - name: Accept SDK Licenses
        run: |
          yes | sdkmanager --licenses

      # ✅ نصب build-tools و platform
      - name: Install SDK Packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"

      # ✅ ساخت venv و نصب buildozer
      - name: Setup Buildozer
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install buildozer cython

      # ✅ Build
      - name: Build APK
        run: |
          source venv/bin/activate
          buildozer android debug

      # ✅ آپلود خروجی
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Finder-APK
          path: bin/*.apk
