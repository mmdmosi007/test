name: Build_Finder_APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ✅ Python پایدار
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ نصب SDK رسمی با اکشن گوگل
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ نصب پکیج‌های لازم
      - name: Install Android Packages
        run: |
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"
          yes | sdkmanager --licenses

      # ✅ وابستگی‌های لینوکس
      - name: Install System Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip build-essential \
            libffi-dev libssl-dev \
            libncurses6 libncurses-dev \
            zlib1g-dev libsqlite3-dev \
            libbz2-dev libreadline-dev liblzma-dev

      # ✅ نصب buildozer
      - name: Install Buildozer
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install cython buildozer

      # ✅ مجبور کردن buildozer به استفاده از SDK سیستم
      - name: Build APK
        run: |
          source venv/bin/activate
          export ANDROIDSDK=$ANDROID_SDK_ROOT
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Finder-APK
          path: bin/*.apk
