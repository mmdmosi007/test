name: Build_Finder_APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ نصب Android SDK + NDK
      - name: Install Android SDK + NDK
        run: |
          sudo mkdir -p /opt/android-sdk
          sudo mkdir -p /opt/android-ndk
          cd /opt/android-sdk

          sudo wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          sudo unzip tools.zip
          sudo mkdir -p /opt/android-sdk/cmdline-tools/latest
          sudo mv cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/ || true

          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin

          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"

          # ✅ ساخت مسیر قدیمی برای هماهنگی با Buildozer
          sudo mkdir -p /opt/android-sdk/tools/bin
          sudo ln -s /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager /opt/android-sdk/tools/bin/sdkmanager

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip build-essential \
            libffi-dev libssl-dev \
            libncurses6 libncurses-dev \
            zlib1g-dev libsqlite3-dev \
            libbz2-dev libreadline-dev liblzma-dev

      - name: Install Buildozer
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install cython buildozer

      - name: Build APK
        run: |
          source venv/bin/activate
          export ANDROIDSDK=/opt/android-sdk
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_NDK_HOME=/opt/android-ndk
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Finder-APK
          path: bin/*.apk
